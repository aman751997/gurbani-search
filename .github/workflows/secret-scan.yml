# Secret scan on every PR. This is the CI backstop behind the pre-commit hook
# in .husky/pre-commit. The pre-commit hook can be bypassed with `--no-verify`
# — this check cannot (unless the branch-protection rule is disabled).
#
# The workflow will only run once a git remote and branch-protection rules
# exist. It is safe to commit this file before either; GitHub simply schedules
# it when the repo is pushed.

name: secret-scan

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          # TruffleHog needs the full history to diff from base..head.
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # For PRs: scan only the commits introduced since the base.
          # For pushes to main: scan the full repo (falls back automatically).
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # Only verified findings (real tokens that the upstream service
          # confirms are live) fail the build. Prevents false positives from
          # pattern-matches on example strings blocking PRs.
          extra_args: --only-verified
